services:
  pantograph:
    image: pantograph:latest
    restart: unless-stopped
    env_file:
      - .env
    build: .
    volumes:
      - "./uploads:/app/uploads"
      - "./data:/app/data"
    expose:
      - "5001"
    networks:
      - web_network

  pantograph-worker:
    image: pantograph:latest
    restart: unless-stopped
    env_file:
      - .env
    build: .
    volumes:
      - "./uploads:/app/uploads"
      - "./data:/app/data"
    # Single always-on sender that drains the notification outbox.
    command: ["uv", "run", "python", "-m", "app.worker"]
    networks:
      - web_network
networks:
  web_network:
    external: true